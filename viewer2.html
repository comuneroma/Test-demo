<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Portale Demo</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .viewer {
      width: 100%;
      min-height: 100vh;
      background: #fff;
    }

    #slide {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    /* area cliccabile invisibile */
    .tap-next {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 35vw;
      height: 18vh;
      z-index: 1000;
      background: transparent;
      border: 0;
      outline: none;
      box-shadow: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .tap-next:focus,
    .tap-next:active {
      outline: none;
      box-shadow: none;
      background: transparent;
    }

    /* etichetta piccola, senza patina */
    .hint {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 1001;
      color: #ffffff;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      background: transparent;
      text-shadow: 0 1px 2px rgba(0,0,0,0.45);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="viewer">
    <img id="slide" alt="Demo Portale" />
  </div>

  <button class="tap-next" onclick="nextSlide()" aria-label="Avanti"></button>
  <div class="hint">Avanti</div>

  <script>
    const base = "https://michelinafolino.github.io/Test-demo/";
    const slides = [
      "immagine1.png"
    ];

    let i = 0;
    const img = document.getElementById("slide");

    function show() {
      img.src = base + slides[i];
    }

    function nextSlide() {
      i = (i + 1) % slides.length;
      show();
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    show();
  </script>

</body>
</html>
